name: Integrate
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-24.04
    name: Lint
    steps:
      - uses: holepunchto/actions/node-base@v1
      - run: npm run lint
  test:
    runs-on: ubuntu-24.04
    name: Test
    steps:
      - uses: holepunchto/actions/node-base@v1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - run: python3 -m venv .venv
      - run: .venv/bin/pip install "git+https://github.com/holepunchto/compact-encoding-python"
      - run: npm test
